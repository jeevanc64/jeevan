<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHASE+ ARENA</title>

<style>
/* ===== RESET – same foundation ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:#0a0c20;
  font-family:'Inter','Segoe UI',system-ui,sans-serif;
  overflow:hidden;
  /* no touch-action:none – laptop uses mouse perfectly */
}

/* ---------- LANDING PAGE (LOBBY) – identical neon style, laptop scale ---------- */
#landingPage {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 40% 50%, #1f2d60, #030518);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
  padding: 20px;
}

.landing-card {
  background: rgba(10, 18, 40, 0.7);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 2px solid #6dc4ff;
  border-radius: 70px; /* fixed radius for laptop */
  padding: 3rem 5rem;
  box-shadow: 0 0 140px #3aa8ff, 0 30px 70px #000d1f;
  text-align: center;
  animation: cardFloat 2.2s infinite alternate ease-in-out;
  width: 100%;
  max-width: 800px;
}

@keyframes cardFloat {
  0% { transform: translateY(0) scale(1); box-shadow: 0 0 100px #3aa8ff; }
  100% { transform: translateY(-12px) scale(1.02); box-shadow: 0 0 200px #ffae70, 0 0 100px #8069ff; }
}

.landing-card h1 {
  font-size: 5.5rem; /* fixed large size for laptop */
  font-weight: 800;
  letter-spacing: 0.05em;
  background: linear-gradient(135deg, #d2ffb0, #b2ccff, #ffc2a0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 80px cyan;
  line-height: 1.1;
}

.landing-card p {
  font-size: 1.8rem;
  color: #d3e4ff;
  margin: 1.2rem 0 2rem;
  border-bottom: 2px dashed #88bdff;
  padding-bottom: 1rem;
}

/* level selector */
.level-selector {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  margin: 2.5rem 0;
  flex-wrap: wrap;
}

.level-btn {
  background: rgba(0, 15, 35, 0.5);
  border: 3px solid #4aa0ff;
  color: white;
  font-size: 2rem;
  font-weight: 700;
  padding: 0.8rem 2.5rem;
  border-radius: 60px;
  cursor: pointer;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 30px #2a7fff;
  transition: 0.15s;
  text-transform: uppercase;
  min-width: 140px;
}

.level-btn.selected {
  background: #4aa0ffcc;
  border-color: #fff7a0;
  box-shadow: 0 0 70px #aaf0ff;
  transform: scale(1.05);
}

.level-btn:active {
  transform: scale(0.96);
}

.btn-group {
  display: flex;
  gap: 2rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.neon-btn {
  background: rgba(0, 15, 35, 0.6);
  border: 3px solid #5fd6ff;
  color: white;
  font-size: 2rem;
  font-weight: 700;
  padding: 0.8rem 3rem;
  border-radius: 60px;
  cursor: pointer;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 60px #1eb0ff;
  transition: 0.18s;
  text-transform: uppercase;
  letter-spacing: 1px;
  min-width: 200px;
}

.neon-btn:active {
  background: #5fd6ff66;
  transform: scale(0.96);
}

/* ---------- GAME AREA – laptop optimised (cursor none, smooth) ---------- */
#gameArea {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #0c1126;
  cursor: none;   /* classic chase cursor */
  overflow: hidden;
  box-shadow: inset 0 0 180px #02051a;
}

.player, .enemy, .coin {
  position: absolute;
  border-radius: 50%;
  will-change: left, top, filter, transform;
  transition: filter 0.15s, transform 0.1s ease-out;
}

.player {
  background: #a8ffb8;
  width: 52px;
  height: 52px;
  box-shadow: 0 0 80px #aeffae, 0 0 40px #6eff9e inset;
  border: 4px solid white;
  z-index: 30;
}

.enemy {
  background: #ff3a60;
  width: 58px;
  height: 58px;
  box-shadow: 0 0 100px #ff657b, 0 0 50px #ff0019 inset;
  border: 4px solid #ffb0c3;
  z-index: 20;
}

.coin {
  background: radial-gradient(circle at 35% 35%, #fffeb0, #fdbb3a);
  width: 38px;
  height: 38px;
  box-shadow: 0 0 110px gold, 0 0 60px #ffae00;
  border: 3px solid #fffed4;
  z-index: 25;
  transition: transform 0.12s cubic-bezier(0.2, 1.2, 0.8, 1);
}

/* floating popup */
.popup {
  position: fixed;
  color: #fff7b0;
  font-size: 2.2rem;
  font-weight: 800;
  text-shadow: 0 0 30px gold, 0 0 60px orange;
  pointer-events: none;
  z-index: 999;
  animation: floatUp 1s ease-out forwards;
  white-space: nowrap;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(0, -120px) scale(1.8); }
}

/* ---------- TRANSPARENT HUD (laptop positioning) ---------- */
#ui {
  position: fixed;
  top: 20px;
  left: 20px;
  right: 20px;
  background: transparent !important;
  padding: 12px 24px;
  border: none !important;
  color: white;
  font-size: 1.8rem;
  font-weight: 700;
  z-index: 40;
  display: flex;
  justify-content: space-between;
  align-items: center;
  pointer-events: none;
  text-shadow: 0 0 15px rgba(255,255,255,0.7);
}

#ui > div {
  display: flex;
  align-items: center;
  gap: 8px;
  background: transparent !important;
  padding: 6px 20px;
}

/* level indicator */
#levelIndicator {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: transparent;
  color: #ffd966;
  font-size: 2rem;
  font-weight: 800;
  text-shadow: 0 0 20px cyan, 0 0 40px blue;
  z-index: 41;
  pointer-events: none;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* hint */
#hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: transparent !important;
  padding: 12px 28px;
  border: none !important;
  color: #eaf2ff;
  font-size: 1.6rem;
  font-weight: 600;
  z-index: 45;
  text-align: center;
  width: fit-content;
  pointer-events: none;
  white-space: nowrap;
  text-shadow: 0 0 20px cyan, 0 0 8px black;
}

/* ---------- GAME OVER – laptop scale ---------- */
#gameOver {
  position: fixed;
  inset: 0;
  background: rgba(2, 4, 18, 0.95);
  backdrop-filter: blur(25px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 20px;
}

.over-card {
  background: #0e163cee;
  padding: 4rem 6rem;
  border-radius: 100px;
  border: 5px solid #ffbc7a;
  box-shadow: 0 0 200px #ff7b7b, 0 0 100px #f6adff;
  text-align: center;
  width: 100%;
  max-width: 800px;
  animation: popIn 0.3s forwards;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

.over-card h1 {
  font-size: 5rem;
  color: #ffddb5;
  text-shadow: 0 0 50px #ff7b00, 0 0 120px #ff3838;
  margin-bottom: 1rem;
}

.over-card p {
  font-size: 2.8rem;
  color: #c1e0ff;
  margin-bottom: 2.5rem;
}

.button-row {
  display: flex;
  gap: 2rem;
  justify-content: center;
  flex-wrap: wrap;
}

.gameover-btn {
  background: transparent;
  border: 4px solid #7df0ff;
  color: white;
  font-size: 2.2rem;
  font-weight: bold;
  padding: 1rem 3.5rem;
  border-radius: 80px;
  cursor: pointer;
  box-shadow: 0 0 80px #00eeff;
  transition: 0.2s;
  min-width: 200px;
}

.gameover-btn.lobby {
  border-color: #ffbc7a;
  box-shadow: 0 0 80px #ffae42;
}

.gameover-btn:active {
  background: #7df0ff33;
  transform: scale(0.96);
}

/* ========== NAME MODAL (laptop) ========== */
#nameModal {
  position: fixed;
  inset: 0;
  background: rgba(2, 4, 18, 0.96);
  backdrop-filter: blur(30px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 20px;
}

.name-card {
  background: rgba(10, 18, 50, 0.85);
  border: 3px solid #6dc4ff;
  border-radius: 70px;
  padding: 3.5rem 5rem;
  box-shadow: 0 0 100px #3aa8ff55, 0 30px 70px #000d1f;
  text-align: center;

}

.name-card h2 {

  font-weight: 800;

}

.name-card p {

#playerNameInput {

#playerNameInput:focus {

}

.name-go-btn {

  font-weight: 700;

}

.name-go-btn:active {
  background: #5fd6ff44;

}

/* ========== LEADERBOARD MODAL (laptop) ========== */
#leaderboardModal {

.lb-card {

.lb-tabs {

.lb-tab {

  font-size: 1.5rem;

}

.lb-tab.active {

}

.lb-list {

}

.lb-entry {

  align-items: center;

.lb-entry:first-child {

.lb-rank {

}

.lb-name {
  font-size: 1.8rem;
  font-weight: 700;
  color: #d3e8ff;
  flex: 1;
  text-align: left;
}

.lb-score {
  font-size: 1.8rem;

  text-shadow: 0 0 16px gold;
}

.lb-empty {

}

.lb-close-btn {

.lb-close-btn:active {

.neon-btn.lb-open {

/* no landscape overrides – laptop is fixed */

async function saveScore(name, scoreVal, level){

  await addDoc(collection(db,"leaderboard"),{
    name: name,
    score: scoreVal,
    level: level,
    created: Date.now()
  });

  const q = query(
    collection(db,"leaderboard"),
    where("level","==",level),
    orderBy("score","desc")
  );

  const snapshot = await getDocs(q);

  let rank = 1;

  snapshot.forEach(doc=>{
    if(doc.data().score > scoreVal){
      rank++;
    }
  });

  alert("🌍 Your World Rank: #" + rank);

}  

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function renderLeaderboard(level){

  const q = query(
    collection(db,"leaderboard"),
    where("level","==",level),
    orderBy("score","desc"),
    limit(5)
  );

  onSnapshot(q,(snapshot)=>{

    const medals = ["🥇","🥈","🥉"];
    let html = "";
    let i = 0;

    snapshot.forEach(doc=>{

      const e = doc.data();

      let rank = i+1;
      let medal = medals[i] ? medals[i] : "#" + rank;

      html += `
        <div class="lb-entry">
          <span class="lb-rank">${medal}</span>
          <span class="lb-name">${escapeHtml(e.name)}</span>
          <span class="lb-score">🏆 ${e.score}</span>
        </div>
      `;

      i++;

    });

    if(html===""){
      lbList.innerHTML='<div class="lb-empty">No scores yet!</div>';
    }else{
      lbList.innerHTML=html;
    }

  });

}
 
/* LEADERBOARD UI */
lbTabs.forEach(tab => {
  tab.onclick = () => {
    lbTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentLbLevel = tab.dataset.level;
    renderLeaderboard(currentLbLevel);
  };
});

lbOpenBtn.onclick = () => {
  currentLbLevel = currentLevel;
  lbTabs.forEach(t => {
    t.classList.toggle('active', t.dataset.level === currentLbLevel);
  });
  renderLeaderboard(currentLbLevel);
  leaderboardModal.style.display = 'flex';
};

lbCloseBtn.onclick = () => {
  leaderboardModal.style.display = 'none';
};

/* LEVEL SELECTION */
function setLevel(level){
  currentLevel = level;

  easyBtn.classList.remove("selected");
  mediumBtn.classList.remove("selected");
  hardBtn.classList.remove("selected");

  if(level==="EASY") easyBtn.classList.add("selected");
  if(level==="MEDIUM") mediumBtn.classList.add("selected");
  if(level==="HARD") hardBtn.classList.add("selected");

  levelIndicator.innerText = level;
}

easyBtn.onclick   = ()=> setLevel("EASY");
mediumBtn.onclick = ()=> setLevel("MEDIUM");
hardBtn.onclick   = ()=> setLevel("HARD");

/* HELPERS – with clamping for laptop screen */
function randPos(size=52){
  return {
    x: Math.random() * (window.innerWidth - size),
    y: Math.random() * (window.innerHeight - size)
  };
}

function randomizeAll(){
  player = randPos(52);
  enemy = randPos(58);
  coin = randPos(38);
}

function updateDOM(){
  playerEl.style.left = player.x + "px";
  playerEl.style.top = player.y + "px";
  enemyEl.style.left = enemy.x + "px";
  enemyEl.style.top = enemy.y + "px";
  coinEl.style.left = coin.x + "px";
  coinEl.style.top = coin.y + "px";
}

function handleMove(x, y){
  if(!gameActive) return;
  // clamp using actual player width
  const pWidth = 52;
  player.x = Math.min(window.innerWidth - pWidth, Math.max(0, x - pWidth/2));
  player.y = Math.min(window.innerHeight - pWidth, Math.max(0, y - pWidth/2));
}

// Mouse move only – laptop doesn't need touch
window.addEventListener("mousemove", e => handleMove(e.clientX, e.clientY));

// (optional: keep touch for 2-in-1 laptops)
window.addEventListener("touchmove", e => {
  e.preventDefault();
  if(e.touches[0]) handleMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

/* GAME LOGIC */
function moveEnemy(){
  const dx = player.x - enemy.x;
  const dy = player.y - enemy.y;
  const dist = Math.hypot(dx, dy);
  if(dist > 1){
    enemy.x += dx / dist * enemySpeed;
    enemy.y += dy / dist * enemySpeed;
  }
}

function collides(a, b){
  return Math.hypot(a.x - b.x, a.y - b.y) < 40;
}

function checkCollisions(){
  if(collides(player, enemy)){
    gameActive = false;
    gameOverSound.currentTime = 0;
    gameOverSound.play();
    saveScore(playerName, score, currentLevel);
    finalSpan.innerText = score;
    gameOver.style.display = "flex";
    if(navigator.vibrate) navigator.vibrate(120);
    return;
  }

  if(collides(player, coin)){
    score++;
    enemySpeed += levelConfig[currentLevel].inc;
    scoreSpan.innerText = score;
    speedSpan.innerText = enemySpeed.toFixed(2);
    coin = randPos(38);
  }
}

function gameLoop(){
  if(!gameActive) return;
  moveEnemy();
  checkCollisions();
  updateDOM();
  animFrame = requestAnimationFrame(gameLoop);
}

/* NAME MODAL */
function showNameModal(callback) {
  playerNameInput.value = playerName || "";
  nameModal.style.display = "flex";
  setTimeout(() => playerNameInput.focus(), 100);

  const go = () => {
    const name = playerNameInput.value.trim();
    if (!name) {
      playerNameInput.style.borderColor = "#ff6060";
      playerNameInput.style.boxShadow = "0 0 40px #ff303088";
      setTimeout(() => {
        playerNameInput.style.borderColor = "";
        playerNameInput.style.boxShadow = "";
      }, 600);
      return;
    }
    playerName = name;
    nameModal.style.display = "none";
    nameGoBtn.onclick = null;
    playerNameInput.onkeydown = null;
    callback();
  };

  nameGoBtn.onclick = go;
  playerNameInput.onkeydown = (e) => { if(e.key === "Enter") go(); };
}

/* START / RESTART */
function startGame(){
  landing.style.display = "none";
  gameArea.style.display = "block";
  ui.style.display = "flex";
  levelIndicator.style.display = "block";
  gameOver.style.display = "none";

  score = 0;
  enemySpeed = levelConfig[currentLevel].base;

  scoreSpan.innerText = "0";
  speedSpan.innerText = enemySpeed.toFixed(2);

  randomizeAll();
  gameActive = true;
  gameLoop();
}

startBtn.onclick = () => {
  showNameModal(() => startGame());
};

function restartGame(){
  gameOver.style.display = "none";
  score = 0;
  enemySpeed = levelConfig[currentLevel].base;

  scoreSpan.innerText = "0";
  speedSpan.innerText = enemySpeed.toFixed(2);

  randomizeAll();
  gameActive = true;
  gameLoop();
}

function goToLobby(){
  gameActive = false;
  gameArea.style.display = "none";
  ui.style.display = "none";
  levelIndicator.style.display = "none";
  gameOver.style.display = "none";
  landing.style.display = "flex";
}

/* BUTTONS */
restartBtn.onclick = restartGame;
lobbyBtn.onclick = goToLobby;

infoBtn.onclick = () => {
  alert("EASY 1.2 · MEDIUM 2.0 · HARD 3.0");
};

setLevel("EASY");
randomizeAll();

})();
</script>
</body>
</html>
